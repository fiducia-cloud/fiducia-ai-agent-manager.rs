name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          path: repo
          submodules: recursive
      - name: Validate GitHub Actions
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: repo/.github/workflows/ci.yml repo/.github/workflows/cli-flags.yml
      - name: Verify CI, container, and documentation pins agree
        shell: bash
        run: |
          set -euo pipefail
          workflow_ref() {
            awk -v repository="$1" '
              $1 == "repository:" && $2 == repository { found = 1; next }
              found && $1 == "ref:" { print $2; exit }
            ' repo/.github/workflows/ci.yml
          }
          verify_pin() {
            local repository="$1" docker_arg="$2"
            local workflow docker
            workflow="$(workflow_ref "$repository")"
            docker="$(sed -n "s/^ARG ${docker_arg}=//p" repo/Dockerfile)"
            test -n "$workflow"
            test "$workflow" = "$docker"
            grep -Fq "\`$workflow\`" repo/README.md
          }
          verify_pin fiducia-cloud/fiducia-interfaces INTERFACES_REF
          verify_pin fiducia-cloud/fiducia-clients CLIENTS_REF
          verify_pin fiducia-cloud/fiducia-messaging.rs MESSAGING_REF
          verify_pin fiducia-cloud/fiducia-telemetry.rs TELEMETRY_REF
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-interfaces
          ref: 6e20a3f4df2e52b99a0ad6add83d4528262b5dbc
          path: fiducia-interfaces
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-clients
          ref: 5695b16a1577aadbfe414123927e45927f88a7f0
          path: fiducia-clients
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-messaging.rs
          ref: cec4ea4f54162758858c6c284324c34a42f3f3d7
          path: fiducia-messaging.rs
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-telemetry.rs
          ref: 20ed56d9e725c9189deb7386a2dee91ea8b25fdb
          path: fiducia-telemetry.rs
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.97.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: repo
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-audit@0.22.2
      - name: Format
        working-directory: repo
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: repo
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test
        working-directory: repo
        run: cargo test --all-features --locked
      - name: Release build
        working-directory: repo
        run: cargo build --release --locked
      - name: Dependency audit
        working-directory: repo
        run: cargo audit
