# flags-2-env flag schema for the fiducia-ai-agent-manager service: maps
# command-line flags to the environment variables the worker reads at boot (see
# src/config.rs, src/agents.rs, src/main.rs). Consumed by
# scripts/with-flags2env.sh and audited in CI (cli-flags.yml). Flags whose help
# ends with "(secret)" carry credentials and must not be logged.
[help]
url = "https://github.com/fiducia-cloud/fiducia-ai-agent-manager.rs"
columns = ["options", "env", "type", "description"]

[parse]
allow_unknown = false
unknown_options_env = "FLAGS2ENV_UNKNOWN_OPTIONS"
errors_env = "FLAGS2ENV_PARSE_ERRORS"

# Credentials and URLs that may embed credentials stay environment-only so
# they never appear in argv, process listings, shell history, or help output.
[env]
ignore = ["FIDUCIA_REPO_URL", "DD_REPO_URL", "NATS_URL", "EVENT_INGEST_URL", "SERVER_AUTH_SECRET", "FIDUCIA_CONTROL_PLANE_SECRET", "FIDUCIA_INTERNAL_SECRET", "EVENT_INGEST_SECRET", "ANTHROPIC_API_KEY", "OPENAI_API_KEY", "GEMINI_API_KEY", "GOOGLE_API_KEY", "OPENCODE_API_KEY", "GH_TOKEN", "GITHUB_TOKEN", "GH_PAT", "GH_DEPLOY_KEY"]

[flags.host]
env = "HOST"
aliases = ["host"]
type = "string"
help = "Bind address for the HTTP server (default 0.0.0.0)."

[flags.port]
env = "PORT"
aliases = ["port"]
type = "integer"
help = "Port for the HTTP/SSE server (default 8080)."

[flags.workspace-repo]
env = "WORKSPACE_REPO"
aliases = ["workspace-repo"]
type = "string"
help = "Path to the warm, configured git checkout every task shares."

[flags.base-branch]
env = "BASE_BRANCH"
aliases = ["base-branch"]
type = "string"
help = "Base branch tasks branch from and merge upstream from (default dev)."

[flags.agent-branch-prefix]
env = "AGENT_BRANCH_PREFIX"
aliases = ["agent-branch-prefix"]
type = "string"
help = "Prefix for per-thread agent branches."

[flags.agent-provider]
env = "AGENT_PROVIDER"
aliases = ["agent-provider"]
type = "string"
help = "Default agent provider (claude-cli, openai-codex-cli, gemini-sdk, ...)."

[flags.worker-bind-mode]
env = "WORKER_BIND_MODE"
aliases = ["worker-bind-mode"]
type = "string"
help = "Worker binding: 'thread' (pinned to one thread) or 'repo'."

[flags.thread-id]
env = "REMOTE_DEV_THREAD_ID"
aliases = ["thread-id"]
type = "string"
help = "Thread this worker is pinned to (also THREAD_ID)."

[flags.nats-event-subject]
env = "NATS_EVENT_SUBJECT"
aliases = ["nats-event-subject"]
type = "string"
help = "Subject execution-progress events publish to."

[flags.control-plane-url]
env = "CONTROL_PLANE_URL"
aliases = ["control-plane-url"]
type = "string"
help = "fiducia-ai-agent-control-plane base URL (also FIDUCIA_CONTROL_PLANE_URL)."

[flags.fiducia-node-url]
env = "FIDUCIA_NODE_URL"
aliases = ["fiducia-node-url"]
type = "string"
help = "Optional fiducia-node URL for direct fencing-token verification."

[flags.outputs-dir]
env = "OUTPUTS_DIR"
aliases = ["outputs-dir"]
type = "string"
help = "Directory where task artifacts are written."

[flags.log-dir]
env = "LOG_DIR"
aliases = ["log-dir"]
type = "string"
help = "Directory for per-conversation logs (default /tmp/convos)."

[flags.log-format]
env = "LOG_FORMAT"
aliases = ["log-format"]
type = "string"
help = "Set to 'json' for structured logs; anything else is human format."
