# cargo-audit configuration.
#
# Accepted advisories — rustls-webpki 0.102.8
# -------------------------------------------
# RUSTSEC-2026-0104 / 0098 / 0099 / 0049 are all fixed in rustls-webpki
# >= 0.103.10. This crate already resolves rustls-webpki 0.103.13 on the
# reqwest/hyper-rustls HTTP path (patched). The vulnerable 0.102.8 copy is
# pulled ONLY by `async-nats v0.38.0`, which hard-pins `rustls-webpki ^0.102`
# in its own Cargo.toml. The first async-nats release that moves to
# `rustls-webpki ^0.103.10` is 0.49.0, so clearing these advisories requires
# bumping async-nats 0.38 -> 0.49 — eleven 0.x minor releases, a breaking major
# bump (JetStream / connect / subscription API changes) with no in-semver path.
#
# Per the hardening policy we do NOT force a breaking bump. Risk is bounded:
# webpki here only verifies the TLS server certificate of the NATS broker, which
# is trusted internal infrastructure (not attacker-controlled certificate
# input). Revisit when async-nats is upgraded to >= 0.49.
#
# rustls-pemfile (RUSTSEC-2025-0134) is an "unmaintained" informational warning
# reached transitively through reqwest/hyper-rustls; it is not a vulnerability
# and does not fail the audit. Left to clear when reqwest drops the dependency.
[advisories]
ignore = [
    "RUSTSEC-2026-0104",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0049",
]
